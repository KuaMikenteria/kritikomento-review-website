<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="static/style.css" />
    <title>Kritikomento - Send Review</title>
  </head>
  <body>
    <header>
      <div class="container">
        <div id="branding">
          <h1><span class="highlight">Kritik</span>omento</h1>
        </div>
        <nav>
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li>
              <a href="categories.html">Categories</a>
              <ul class="dropdown">
                <li><a href="categories/movie.html">Movies</a></li>
                <li><a href="categories/book.html">Books</a></li>
                <li><a href="categories/art.html">Art</a></li>
              </ul>
            </li>
            <li class="current"><a href="send-review.html">Send Review</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <section id="main">
      <div class="container">
        <h1>Submit Your Critique</h1>
        <form action="#" method="post" onsubmit="return false;">
          <label for="name">Name:</label>
          <input type="text" id="name" name="name" required />

          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required />

          <label for="category">Category:</label>
          <select id="category" name="category" required>
            <option value="">Select a category</option>
            <option value="movie">Movie</option>
            <option value="book">Book</option>
            <option value="art">Art</option>
          </select>

          <label for="title">Title of Work:</label>
          <input type="text" id="title" name="title" required />

          <label for="review">Your Critique:</label>
          <textarea
            id="review"
            name="review"
            required
            placeholder="Delve into the shadows..."
          ></textarea>

          <button type="submit">Submit Critique</button>
        </form>
      </div>
    </section>

    <footer>
      <p>&copy; 2026 Kritikomento. All rights reserved.</p>
    </footer>

    <script src="static/script.js"></script>
  </body>
</html>
